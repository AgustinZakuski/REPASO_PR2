<div style="display:flex; flex-direction:column; gap:20px; padding:1.5rem 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <h2 class="sr-only">Cuestionario interactivo de repaso de Programación II con 28 preguntas de opción múltiple y corrección automática</h2>

  <div id="score-bar" style="display:flex; align-items:center; justify-content:between; background:rgba(var(--surface-1-rgb, 255, 255, 255), 0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border, #e2e8f0); border-radius:14px; padding:14px 20px; position:sticky; top:12px; z-index:10; box-shadow:0 4px 20px -2px rgba(0,0,0,0.05);">
    <div style="display:flex; flex-direction:column; gap:2px;">
      <span id="score-text" style="font-size:13px; font-weight:600; color:var(--text-main, #1e293b)">0 / 28 respondidas</span>
      <span style="font-size:11px; color:var(--text-secondary, #64748b)">Progreso de repaso</span>
    </div>
    <span id="score-correct" style="font-size:14px; font-weight:700; color:#10b981; background:rgba(16,185,129,0.1); padding:6px 12px; border-radius:20px;">0 correctas</span>
  </div>

  <div id="quiz" style="display:flex; flex-direction:column; gap:16px;"></div>
</div>

<script>
var quizData = [
{q:"¿Qué visibilidad deben tener SIEMPRE los atributos de un objeto, según las buenas prácticas vistas?", options:["Pública","Privada","Protegida","Depende del atributo"], correct:1, exp:"Los atributos deben ser siempre privados para asegurar el encapsulamiento; la visibilidad variable aplica sobre todo a los métodos."},
{q:"La firma de un método incluye:", options:["Solo el nombre del método","El nombre más los parámetros que recibe y devuelve","Solo el tipo de retorno","El nombre más la visibilidad de la clase"], correct:1, exp:"La firma es la forma de definir al método: su nombre y los parámetros de entrada y salida."},
{q:"¿Qué modificador de visibilidad permite el acceso desde las subclases, pero no desde afuera de ellas?", options:["Público (+)","Privado (-)","Protegido (#)","Default (~)"], correct:2, exp:"Protegido (#) se copia a la subclase pero no está disponible fuera de ella; default (~) es a nivel de paquete."},
{q:"Si dos clases tienen una relación de Asociación bidireccional, esto significa que:", options:["Solo una le puede pedir a la otra","Ambas se pueden pedir mutuamente","El tiempo de vida de una depende de la otra","Es funcionalmente idéntica a una composición"], correct:1, exp:"La navegabilidad bidireccional implica que ambos objetos tienen referencia mutua entre sí."},
{q:"¿Cuál es la diferencia clave entre Agregación y Composición?", options:["No hay ninguna diferencia real","En composición el objeto contenido puede pertenecer a varios todos; en agregación no","En composición cada parte pertenece a un solo todo y muere con él; en agregación puede sobrevivir","La agregación siempre usa diamante relleno"], correct:2, exp:"Composición es más restrictiva: cada componente pertenece a un solo todo y su vida depende del contenedor. En Agregación, la parte puede sobrevivir al todo."},
{q:"La multiplicidad \"0..*\" indica:", options:["Exactamente cero instancias","De cero a varias instancias","De una a varias instancias","Solo una instancia"], correct:1, exp:"0..* significa de cero a varios, según el cuadro de multiplicidad de tus apuntes."},
{q:"Un Diagrama de Clases se podría describir informalmente como:", options:["El diagrama de secuencia en reposo","Una foto del sistema","Un caso de uso gráfico","Un diagrama de paquetes expandido"], correct:1, exp:"La teoría lo describe como \"básicamente una foto del sistema\", en contraste con el diagrama de secuencia, que es dinámico."},
{q:"En un Diagrama de Secuencia, la destrucción temprana de un objeto se representa con:", options:["Un rombo relleno","Una flecha etiquetada <<destruir>> que apunta a una X","Una línea de vida más larga","Un rectángulo con calificador LOOP"], correct:1, exp:"Los objetos pueden eliminarse tempranamente con una flecha <<destruir>> que apunta a una X al final de la línea de vida."},
{q:"¿Cuál de estas NO es una característica de una interfaz en Java?", options:["Solo tiene métodos abstractos (salvo default/static desde Java 8)","Sus variables son finales por defecto","Puede tener atributos protegidos con lógica propia","Sus métodos son públicos y abstractos implícitamente"], correct:2, exp:"Una interfaz no tiene atributos con lógica propia ni modificadores como protegido: solo constantes finales y métodos abstractos."},
{q:"Si una clase de Facturación además envía emails y genera reportes PDF, ¿qué principio SOLID está violando más directamente?", options:["Liskov Substitution","Single Responsibility","Interface Segregation","Open/Closed"], correct:1, exp:"Tener más de una razón para cambiar (facturar, enviar emails, generar PDFs) es una violación directa de Single Responsibility."},
{q:"El principio de Inversión de Dependencias (DIP) establece que:", options:["Los módulos de bajo nivel deben depender de los de alto nivel","Tanto los módulos de alto como de bajo nivel deben depender de abstracciones","Las abstracciones deben depender de los detalles","No debe existir ningún tipo de dependencia entre módulos"], correct:1, exp:"DIP invierte la noción unconventional: ambos niveles dependen de abstracciones, y los detalles dependen de lo abstracto, no al revés."},
{q:"Alta cohesión y bajo acoplamiento son deseables porque:", options:["Un módulo hace muchas cosas no relacionadas y depende de muchos otros módulos","Las tareas de un módulo están enfocadas en su propósito y depende lo mínimo posible de otros módulos","Son conceptos opuestos que no pueden buscarse a la vez","Solo aplican a la capa de presentación"], correct:1, exp:"Más cohesión y menos acoplamiento son ambos indicadores de mayor calidad de diseño, y se buscan simultáneamente."},
{q:"En la arquitectura de \"Capas Estrictas\" (Strict Layering):", options:["Cualquier capa puede invocar a cualquier otra libremente","Cada capa solo puede invocar a la que está directamente debajo de ella","Solo puede existir una capa","Todas las capas deben estar en la misma máquina física"], correct:1, exp:"En capas estrictas, cada capa solo invoca a la que tiene directamente debajo, a diferencia del \"salto de capas\"."},
{q:"¿Qué distingue a la arquitectura de N-capas del estilo de capas simple?", options:["N-capas no tiene capa de datos","En N-capas, cada segmento reside en un computador físicamente separado","N-capas no permite más de dos capas","Son exactamente lo mismo"], correct:1, exp:"El estilo por capas puede convivir en la misma máquina; N-capas separa físicamente cada capa en distintos servidores."},
{q:"Los patrones de diseño del GoF se documentaron por primera vez en los lenguajes:", options:["Java y C#","C/C++ y Smalltalk","Python y Java","C# y Smalltalk"], correct:1, exp:"El grupo GoF descubrió sus ~20 patrones iniciales documentados en C/C++ y Smalltalk, entre 1994 y 1995."},
{q:"La \"Motivación\" de un patrón, según la teoría, se suele explicar en:", options:["Un diagrama de clases completo","Un párrafo breve, de 3 a 6 líneas","Un ejemplo de código funcional","Una tabla comparativa de todos los patrones"], correct:1, exp:"La motivación explica el problema recurrente en un párrafo breve, típicamente de 3 a 6 líneas."},
{q:"¿Cuál de estos patrones pertenece a la categoría Creacional?", options:["Composite","Observer","Abstract Factory","Adapter"], correct:2, exp:"Abstract Factory es Creacional; Composite y Adapter son Estructurales, y Observer es de Comportamiento."},
{q:"Singleton se implementa correctamente con:", options:["Constructor público y atributo privado no estático","Constructor privado + atributo estático y privado + método estático y público para obtener la instancia","Constructor protegido y método privado sin retorno","Sin constructor definido"], correct:1, exp:"Esa es la implementación clásica de Singleton según tus apuntes: constructor privado, atributo estático privado, y getInstance() estático público."},
{q:"Un Strategy concreto puede convertirse en Singleton solo si:", options:["Siempre, cualquier Strategy puede ser Singleton sin condiciones","Tiene un estado interno NO compartido por toda la aplicación","Tiene un estado interno que SÍ es compartido por toda la aplicación","Strategy y Singleton son mutuamente excluyentes"], correct:1, exp:"Según tu apunte extra: si un Strategy concreto tiene un estado interno no compartido por toda la aplicación, puede ser Singleton."},
{q:"Singleton puede reducir la proliferación de objetos con Strategy:", options:["Siempre, en cualquier caso","Nunca, son conceptos incompatibles","Solo si la estrategia NO requiere una instancia para cada consumidor","Solo si hay más de 10 consumidores"], correct:2, exp:"Tu apunte extra lo aclara: Singleton puede solucionar la proliferación de objetos con Strategy solo si la estrategia no requiere una instancia por consumidor."},
{q:"¿Qué patrón permite tratar objetos simples y compuestos del mismo modo?", options:["Composite","Proxy","Command","State"], correct:0, exp:"Composite simplifica el tratamiento uniforme de objetos simples y compuestos."},
{q:"El patrón Proxy, según tu resumen, se caracteriza por:", options:["Encapsular una operación en un objeto","Proporcionar un sustituto de otro objeto y controlar el acceso a él","Notificar automáticamente a observadores","Definir una interfaz estándar de creación"], correct:1, exp:"Proxy da un sustituto de otro objeto y controla el acceso, permitiendo actuar antes o después de que la solicitud llegue al original."},
{q:"Diferencia clave entre State y Strategy:", options:["Son sinónimos exactos","State cambia el comportamiento según el estado interno; Strategy elige explícitamente qué algoritmo usar en tiempo de ejecución","State es Creacional y Strategy es Estructural","Strategy no permite cambios en tiempo de ejecución"], correct:1, exp:"State reacciona a cambios de estado interno; Strategy permite elegir explícitamente entre varios algoritmos disponibles."},
{q:"El antipatrón \"Fábrica de combustible\" (Gas Factory) describe:", options:["Un sistema sin estructura definida","Diseñar de forma innecesariamente compleja, sobre-modelando","Reusar objetos inadecuados para el fin que se persigue","Heredar funcionalidad de una clase utilidad"], correct:1, exp:"Gas Factory es diseñar por demás, sobre-modelar funcionalidad que no se sabe si se va a necesitar. No confundir con Gran bola de lodo, que es la falta de estructura."},
{q:"\"Base Bean\" es un antipatrón que consiste en:", options:["Validar mal las entradas del sistema","Heredar funcionalidad de una clase utilidad en lugar de delegar lo que se necesite","Usar demasiadas capas innecesarias","Construir una clase con métodos que deben llamarse en orden"], correct:1, exp:"Base Bean es heredar de una clase utilidad en vez de delegar, generando acoplamiento innecesario por herencia."},
{q:"En el patrón de arquitectura MVC, ¿qué capa dirige el flujo de datos entre la vista y el modelo?", options:["La vista","El modelo","El controlador","MVC no separa esa responsabilidad en una capa"], correct:2, exp:"El controlador atiende lo que sucede en la vista y sabe hacia dónde dirigir los datos y el flujo."},
{q:"Emplear objetos cuyo único propósito es pasar información a otros objetos sin aportar valor ni transformarla es el antipatrón:", options:["Poltergeist","Objeto Sumidero","Problema del yoyó","Interfaz inflada"], correct:0, exp:"Poltergeist describe objetos que solo pasan información a terceros sin aportar valor ni realizar transformaciones."},
{q:"¿Cuál de las siguientes NO es una de las cinco relaciones UML vistas en el curso?", options:["Composición","Agregación","Herencia múltiple","De Uso"], correct:2, exp:"Las cinco relaciones del curso son Generalización/Especialización, Agregación, Composición, Asociación y De Uso. \"Herencia múltiple\" no figura como una de ellas."}
];

var container = document.getElementById('quiz');
var answered = 0, correctCount = 0;

quizData.forEach(function(item, qi){
  var card = document.createElement('div');
  card.style.background = 'var(--surface-1, #ffffff)';
  card.style.borderRadius = '16px';
  card.style.padding = '20px';
  card.style.border = '1px solid var(--border, #e2e8f0)';
  card.style.boxShadow = '0 1px 3px rgba(0,0,0,0.02)';
  card.style.transition = 'transform 0.2s ease, box-shadow 0.2s ease';

  var qEl = document.createElement('p');
  qEl.style.fontSize = '14px';
  qEl.style.fontWeight = '600';
  qEl.style.color = 'var(--text-main, #0f172a)';
  qEl.style.margin = '0 0 16px';
  qEl.style.lineHeight = '1.5';
  qEl.textContent = (qi+1) + '. ' + item.q;
  card.appendChild(qEl);

  var optsWrap = document.createElement('div');
  optsWrap.style.display = 'flex';
  optsWrap.style.flexDirection = 'column';
  optsWrap.style.gap = '8px';

  var explEl = document.createElement('p');
  explEl.style.fontSize = '13px';
  explEl.style.lineHeight = '1.5';
  explEl.style.margin = '14px 0 0';
  explEl.style.padding = '12px 14px';
  explEl.style.borderRadius = '10px';
  explEl.style.display = 'none';

  item.options.forEach(function(optText, oi){
    var opt = document.createElement('div');
    opt.textContent = optText;
    opt.style.fontSize = '13px';
    opt.style.fontWeight = '500';
    opt.style.color = 'var(--text-main, #334155)';
    opt.style.padding = '10px 14px';
    opt.style.borderRadius = '10px';
    opt.style.border = '1px solid var(--border, #e2e8f0)';
    opt.style.background = 'var(--surface-2, #f8fafc)';
    opt.style.cursor = 'pointer';
    opt.style.transition = 'all 0.15s ease';
    opt.setAttribute('role','button');
    opt.setAttribute('tabindex','0');

    // Efecto Hover táctil y visual
    opt.onmouseenter = function() {
      if(!card.dataset.answered) {
        opt.style.background = 'var(--border, #cbd5e1)';
        opt.style.transform = 'translateX(4px)';
      }
    };
    opt.onmouseleave = function() {
      if(!card.dataset.answered) {
        opt.style.background = 'var(--surface-2, #f8fafc)';
        opt.style.transform = 'none';
      }
    };

    opt.onclick = function(){
      if(card.dataset.answered) return;
      card.dataset.answered = '1';
      answered++;
      var isCorrect = oi === item.correct;
      if(isCorrect) correctCount++;

      Array.prototype.forEach.call(optsWrap.children, function(child, ci){
        child.style.transform = 'none';
        if(ci === item.correct){
          child.style.background = 'var(--bg-success, #dcfce7)';
          child.style.color = 'var(--text-success, #15803d)';
          child.style.borderColor = 'var(--border-success, #bbf7d0)';
        } else if(ci === oi){
          child.style.background = 'var(--bg-danger, #fee2e2)';
          child.style.color = 'var(--text-danger, #b91c1c)';
          child.style.borderColor = 'var(--border-danger, #fecaca)';
        } else {
          child.style.opacity = '0.4';
        }
      });

      if(isCorrect) {
        explEl.style.background = 'rgba(16,185,129,0.06)';
        explEl.style.color = '#15803d';
        explEl.style.borderLeft = '4px solid #10b981';
        explEl.innerHTML = '<strong>✨ Correcto:</strong> ' + item.exp;
      } else {
        explEl.style.background = 'rgba(239,68,68,0.06)';
        explEl.style.color = '#b91c1c';
        explEl.style.borderLeft = '4px solid #ef4444';
        explEl.innerHTML = '<strong>❌ Incorrecto:</strong> ' + item.exp;
      }
      explEl.style.display = 'block';

      document.getElementById('score-text').textContent = answered + ' / ' + quizData.length + ' respondidas';
      document.getElementById('score-correct').textContent = correctCount + ' correctas';
    };

    optsWrap.appendChild(opt);
  });

  card.appendChild(optsWrap);
  card.appendChild(explEl);
  container.appendChild(card);
});
</script>
